name: Update Lotto CSV

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 23:00 PL (lato) / 22:00 (zima)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

- name: Pobierz CSV
        run: |
          curl -fSL \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            -o lotto.csv \
            "https://www.wynikilotto.net.pl/download/lotto.csv"

      - name: Commit, jeśli plik się zmienił
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lotto.csv
          if git diff --staged --quiet; then
            echo "Brak zmian."
          else
            git commit -m "Aktualizacja lotto.csv $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
